<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر العمولة | أفضل المنتجات من أمازون وعلي إكسبريس</title>
    <!-- Tailwind CSS عبر الرابط المباشر (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // تهيئة ألوان مخصصة لـ Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                    }
                }
            }
        }
    </script>
    <style>
        /* إضافة خطوط عربية جميلة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    
    <!-- Header / Navbar -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center" aria-label="القائمة الرئيسية">
            <a href="/" class="text-2xl font-bold text-blue-600">متجري</a>
            
            <div class="hidden md:flex space-x-reverse space-x-6">
                <a href="#" class="hover:text-blue-600">الرئيسية</a>
                <a href="#products" class="hover:text-blue-600">المنتجات</a>
                <a href="#" class="hover:text-blue-600">عن الموقع</a>
            </div>

            <button class="md:hidden p-2" aria-label="فتح القائمة">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="bg-blue-600 text-white py-16">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">تسوق أفضل المنتجات المختارة بعناية</h1>
            <p class="text-xl mb-8 text-blue-100">نوفر لك أفضل العروض من أمازون، جوميا، وعلي إكسبريس في مكان واحد.</p>
            <a href="#products" class="bg-white text-blue-600 px-8 py-3 rounded-full font-bold text-lg hover:bg-blue-50 transition-colors">تصفح المنتجات الآن</a>
        </div>
    </section>

    <!-- Products Grid -->
    <main id="products" class="container mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold mb-8 text-center">أحدث المنتجات</h2>
        
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- المنتجات ستظهر هنا عبر JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 py-12 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-4">&copy; 2026 متجر العمولة. جميع الحقوق محفوظة.</p>
            <div class="flex justify-center space-x-reverse space-x-4">
                <a href="#" class="hover:text-white">سياسة الخصوصية</a>
                <a href="#" class="hover:text-white">شروط الاستخدام</a>
            </div>
        </div>
    </footer>

    <!-- Main JS -->
    <script src="./main.js"></script>
</body>
</html>
