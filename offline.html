<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStore | غير متصل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        :focus-visible { outline: 3px solid #4f46e5; outline-offset: 2px; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300">
    <main class="text-center max-w-md" role="alert" aria-live="assertive">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-indigo-100 dark:bg-indigo-900/30 rounded-full mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 text-indigo-600 dark:text-indigo-400" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/>
            </svg>
        </div>

        <h1 id="offline-title" class="text-3xl font-bold mb-4 text-gray-800 dark:text-white">
            لا يوجد اتصال بالإنترنت
        </h1>

        <p id="offline-desc" class="text-lg text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
            يبدو أنك غير متصل بالشبكة. المحتوى المعروض قد لا يكون محدثاً.
        </p>

        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <svg class="w-5 h-5 text-indigo-600 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
                <p id="offline-hint" class="text-sm text-gray-500 dark:text-gray-400 text-right">
                    يمكنك تصفح المنتجات المخزنة مؤقتاً. عند عودة الاتصال، سيتم تحديث المحتوى تلقائياً.
                </p>
            </div>
        </div>

        <button onclick="window.location.reload()" class="inline-flex items-center gap-2 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg" aria-label="إعادة المحاولة">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span id="retry-btn">إعادة المحاولة</span>
        </button>

        <div class="mt-12 text-gray-400 dark:text-gray-500 text-sm">
            <p>NovaStore &copy; 2026</p>
        </div>
    </main>

    <script>
        const translations = {
            ar: {
                title: "NovaStore | غير متصل",
                heading: "لا يوجد اتصال بالإنترنت",
                desc: "يبدو أنك غير متصل بالشبكة. المحتوى المعروض قد لا يكون محدثاً.",
                hint: "يمكنك تصفح المنتجات المخزنة مؤقتاً. عند عودة الاتصال، سيتم تحديث المحتوى تلقائياً.",
                retry: "إعادة المحاولة"
            },
            fr: {
                title: "NovaStore | Hors ligne",
                heading: "Pas de connexion Internet",
                desc: "Vous semblez être hors ligne. Le contenu affiché peut ne pas être à jour.",
                hint: "Vous pouvez parcourir les produits mis en cache. Lorsque la connexion sera rétablie, le contenu sera automatiquement mis à jour.",
                retry: "Réessayer"
            },
            en: {
                title: "NovaStore | Offline",
                heading: "No Internet Connection",
                desc: "You appear to be offline. The displayed content may not be up to date.",
                hint: "You can browse cached products. When the connection is restored, the content will be updated automatically.",
                retry: "Retry"
            }
        };

        function applyLang() {
            const lang = localStorage.getItem('selectedLang') || 'ar';
            const t = translations[lang];
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            document.title = t.title;
            document.getElementById('offline-title').textContent = t.heading;
            document.getElementById('offline-desc').textContent = t.desc;
            document.getElementById('offline-hint').textContent = t.hint;
            document.getElementById('retry-btn').textContent = t.retry;
        }

        function applyTheme() {
            const theme = localStorage.getItem('selectedTheme') || 'light';
            if (theme === 'dark') document.documentElement.classList.add('dark');
        }

        applyLang();
        applyTheme();
    </script>
</body>
</html>
