<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات | NovaStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        /* تصميم مفتاح التبديل (Toggle Switch) */
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(-100%); background-color: #4f46e5; }
        [dir="ltr"] input:checked ~ .dot { transform: translateX(100%); }
        
        /* تحسين التركيز للوصول */
        :focus-visible {
            outline: 3px solid #4f46e5;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    
    <header class="bg-white dark:bg-gray-800 shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex items-center">
            <a href="index.html" id="back-link" onclick="localStorage.setItem('returnFocus', 'true')" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 transition-colors flex items-center gap-2 font-bold" aria-label="العودة للمتجر">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                <span id="back-text">العودة للمتجر</span>
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <h1 id="settings-title" tabindex="-1" class="text-3xl font-bold mb-8 focus:outline-none">إعدادات الموقع</h1>

        <div class="space-y-6">
            <!-- لغة الموقع -->
            <section class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700" aria-labelledby="lang-title">
                <h2 id="lang-title" class="text-xl font-bold mb-6 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-indigo-600" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m10.5 21 5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 0 1 6-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 0 1-3.827-5.802" />
                    </svg>
                    <span>لغة الموقع (Language)</span>
                </h2>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="changeLanguage('ar')" id="lang-ar" class="w-full flex justify-between items-center p-4 rounded-xl border-2 transition-all" aria-pressed="true">
                        <span class="font-bold">العربية</span>
                        <svg id="check-ar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-indigo-600 hidden" aria-hidden="true">
                            <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z" clip-rule="evenodd" />
                        </svg>
                    </button>

                    <button onclick="changeLanguage('fr')" id="lang-fr" class="w-full flex justify-between items-center p-4 rounded-xl border-2 transition-all" aria-pressed="false">
                        <span class="font-bold">Français</span>
                        <svg id="check-fr" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-indigo-600 hidden" aria-hidden="true">
                            <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </section>

            <!-- مظهر الموقع (Toggle) -->
            <section class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700" aria-labelledby="theme-title">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg text-indigo-600 dark:text-indigo-400" aria-hidden="true">
                            <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path id="icon-path" stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M12 18.75V21m-4.773-4.227l-1.591 1.591" />
                            </svg>
                        </div>
                        <div>
                            <h2 id="theme-title" class="text-lg font-bold">مظهر الموقع (Theme)</h2>
                            <p id="theme-status" class="text-sm text-gray-500 dark:text-gray-400">الوضع الفاتح</p>
                        </div>
                    </div>

                    <!-- مفتاح التبديل -->
                    <label for="theme-toggle" class="flex items-center cursor-pointer select-none" aria-label="تبديل الوضع الليلي">
                        <div class="relative">
                            <input type="checkbox" id="theme-toggle" class="sr-only" onchange="toggleTheme()">
                            <div class="block bg-gray-200 dark:bg-gray-700 w-14 h-8 rounded-full transition-colors"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full shadow transition-all"></div>
                        </div>
                    </label>
                </div>
            </section>

            <!-- تثبيت التطبيق (PWA) -->
            <section id="pwa-settings-section" class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 hidden" aria-labelledby="pwa-install-title">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-green-50 dark:bg-green-900/30 rounded-lg text-green-600 dark:text-green-400" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                            </svg>
                        </div>
                        <div>
                            <h2 id="pwa-install-title" class="text-lg font-bold">تطبيق المتجر</h2>
                            <p id="pwa-install-status" class="text-sm text-gray-500 dark:text-gray-400">ثبت المتجر على جهازك كـ تطبيق</p>
                        </div>
                    </div>
                    <button id="pwa-install-settings-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md focus:ring-2 focus:ring-indigo-500">
                        تثبيت الآن
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- ربط ملف JavaScript الخارجي أو كتابة المنطق هنا بشكل صحيح -->
    <script>
        const translations = {
            ar: {
                back: "العودة للمتجر",
                title: "إعدادات الموقع",
                lang_title: "لغة الموقع (Language)",
                theme_title: "مظهر الموقع (Theme)",
                light: "الوضع الفاتح",
                dark: "الوضع الليلي",
                pwa_title: "تطبيق المتجر",
                pwa_status: "ثبت المتجر على جهازك كـ تطبيق",
                pwa_btn: "تثبيت الآن",
                toggle_theme: "تبديل الوضع الليلي"
            },
            fr: {
                back: "Retour au magasin",
                title: "Paramètres du site",
                lang_title: "Langue du site",
                theme_title: "Thème du site",
                light: "Mode Clair",
                dark: "Mode Sombre",
                pwa_title: "Application du magasin",
                pwa_status: "Installer le magasin sur votre appareil",
                pwa_btn: "Installer",
                toggle_theme: "Changer le thème"
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('selectedLang', lang);
            updateUI();
        }

        function toggleTheme() {
            const isDark = document.getElementById('theme-toggle').checked;
            localStorage.setItem('selectedTheme', isDark ? 'dark' : 'light');
            updateUI();
        }

        function updateUI() {
            const lang = localStorage.getItem('selectedLang') || 'ar';
            const theme = localStorage.getItem('selectedTheme') || 'light';
            const isAr = lang === 'ar';
            const isDark = theme === 'dark';
            const t = translations[lang];

            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;

            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            // تحديث النصوص
            document.getElementById('back-text').textContent = t.back;
            document.getElementById('back-link').setAttribute('aria-label', t.back);
            document.getElementById('settings-title').textContent = t.title;
            document.getElementById('lang-title').querySelector('span').textContent = t.lang_title;
            document.getElementById('theme-title').textContent = t.theme_title;
            document.getElementById('theme-status').textContent = isDark ? t.dark : t.light;
            document.querySelector('label[for="theme-toggle"]').setAttribute('aria-label', t.toggle_theme);

            // تحديث نصوص PWA
            const pwaTitle = document.getElementById('pwa-install-title');
            if (pwaTitle) pwaTitle.textContent = t.pwa_title;
            const pwaStatus = document.getElementById('pwa-install-status');
            if (pwaStatus) pwaStatus.textContent = t.pwa_status;
            const pwaBtn = document.getElementById('pwa-install-settings-btn');
            if (pwaBtn) pwaBtn.textContent = t.pwa_btn;

            // تحديث حالة مفتاح التبديل
            document.getElementById('theme-toggle').checked = isDark;

            // تحديث الأيقونة
            const iconPath = document.getElementById('icon-path');
            if (isDark) {
                iconPath.setAttribute('d', 'M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z');
            } else {
                iconPath.setAttribute('d', 'M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M12 18.75V21m-4.773-4.227l-1.591 1.591');
            }

            // تحديث شكل أزرار اللغة (تحسين إمكانية الوصول)
            const activeClass = 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400';
            const inactiveClass = 'border-transparent bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700';

            const btnAr = document.getElementById('lang-ar');
            const btnFr = document.getElementById('lang-fr');

            btnAr.className = `w-full flex justify-between items-center p-4 rounded-xl border-2 transition-all ${isAr ? activeClass : inactiveClass}`;
            btnFr.className = `w-full flex justify-between items-center p-4 rounded-xl border-2 transition-all ${!isAr ? activeClass : inactiveClass}`;
            
            btnAr.setAttribute('aria-pressed', isAr);
            btnFr.setAttribute('aria-pressed', !isAr);

            document.getElementById('check-ar').classList.toggle('hidden', !isAr);
            document.getElementById('check-fr').classList.toggle('hidden', isAr);
        }

        // منطق PWA لصفحة الإعدادات
        let deferredPromptSettings;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPromptSettings = e;
            const pwaSection = document.getElementById('pwa-settings-section');
            if (pwaSection) pwaSection.classList.remove('hidden');
        });

        const installBtnSettings = document.getElementById('pwa-install-settings-btn');
        if (installBtnSettings) {
            installBtnSettings.addEventListener('click', async () => {
                if (!deferredPromptSettings) return;
                deferredPromptSettings.prompt();
                const { outcome } = await deferredPromptSettings.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-settings-section').classList.add('hidden');
                }
                deferredPromptSettings = null;
            });
        }

        // تنفيذ التحديث عند التحميل
        updateUI();
        
        // التركيز على عنوان الصفحة عند التحميل لتحسين إمكانية الوصول
        window.addEventListener('load', () => {
            document.getElementById('settings-title').focus();
        });
    </script>
</body>
</html>
